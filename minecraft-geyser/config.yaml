name: Minecraft Geyser Server
version: "1.2.0"
slug: minecraft_geyser
description: Minecraft server supporting Java and Bedrock clients with whitelist and operator management
init: false
arch:
  - amd64
  - aarch64
  - armv7
ingress: true
ingress_port: 8100
panel_icon: mdi:cube-outline
panel_title: Minecraft
ports:
  25565/tcp: 25565
  19132/udp: 19132
  25575/tcp: 25575
ports_description:
  25565/tcp: Minecraft Java Edition port
  19132/udp: Minecraft Bedrock Edition port
  25575/tcp: RCON port (only used if ENABLE_RCON is true)
map:
  - addons:rw
  - media:rw
options:
  EULA: true
  TYPE: PAPER
  PAPER_CHANNEL: default
  VERSION: 1.21.5
  MEMORY: 1024M
  MOTD: Welcome to our Minecraft Server!
  MAX_PLAYERS: 20
  ONLINE_MODE: true
  ALLOW_FLIGHT: true
  DIFFICULTY: peaceful
  MODE: creative
  PLUGINS: https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot,https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
  USER_API_PROVIDER: mojang
  BLUEMAP_ENABLED: true
  BLUEMAP_VERSION: "5.20"
  ENABLE_RCON: false
  RCON_PORT: 25575
  BACKUP_ENABLED: true
  BACKUP_DELAY_MINUTES: 1440
  BACKUP_KEEP_COUNT: 7
schema:
  EULA: bool
  TYPE: str
  PAPER_CHANNEL: list(default|experimental|alpha)
  VERSION: str
  MEMORY: str
  MOTD: str
  MAX_PLAYERS: int
  ONLINE_MODE: bool
  ALLOW_FLIGHT: bool
  DIFFICULTY: list(peaceful|easy|normal|hard)
  MODE: list(survival|creative|adventure|spectator)
  PLUGINS: str
  WHITELIST: str?
  ENABLE_WHITELIST: bool?
  ENFORCE_WHITELIST: bool?
  USE_AIKAR_FLAGS: bool?
  FORCE_GAMEMODE: bool?
  USER_API_PROVIDER: list(playerdb|mojang)
  OPS: str?
  TZ: str?
  BLUEMAP_ENABLED: bool
  BLUEMAP_VERSION: str
  ENABLE_RCON: bool
  RCON_PASSWORD: password?
  RCON_PORT: int
  BACKUP_ENABLED: bool
  BACKUP_DELAY_MINUTES: int(15,10080)
  BACKUP_KEEP_COUNT: int(1,365)
